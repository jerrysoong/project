<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>My Personal Favorite Places To Go Eat</title>
    <link rel="icon" href="images/cutepancakeicon.png" type="image/png">
    <link href="bootstrap/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f9f9f9;
            color: #333;
            padding: 20px;
        }
        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        h1 {
            text-align: center;
            margin-bottom: 40px;
        }
        .restaurant-card {
            background-color: #fff;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            margin: 20px;
            padding: 20px;
            width: 80%;
            max-width: 400px;
            text-align: center;
        }
        .restaurant-card h2 {
            color: #2c3e50;
            font-size: 1.6rem;
        }
        .restaurant-card p {
            font-size: 1.1rem;
            color: #555;
        }
        .restaurant-card img {
            width: 100%;
            border-radius: 8px;
            margin-top: 15px;
            height: auto;
        }
    </style>
</head>
<body>
<div class="container">
    <h1>MY PERSONAL FAVORITE PLACES TO GO EAT</h1>

    <!-- Restaurant 1 -->
    <div class="restaurant-card">
        <h2>Kenny Rogers Roasters</h2>
        <p><strong>Favorite Order:</strong> Smart Privileges Full Platter Order</p>
        <img src="fullplatter.png" alt="Smart Privileges Full Platter Order">
    </div>

    <!-- Restaurant 2 -->
    <div class="restaurant-card">
        <h2>Lan Zhou La Mien</h2>
        <p><strong>My Favorite Fried Rice EVER:</strong> Yang Zhou Chao Fan</p>
        <img src="yangzhouchaofan.png" alt="Yang Zhou Chao Fan">
    </div>

    <!-- Restaurant 3 -->
    <div class="restaurant-card">
        <h2></h2>
        <p><strong>The Best Dumplings Out There From Fudao by Immense:</strong> Steamed Dumplings</p>
        <img src="dumplings.png" alt="Steamed Dumplings">
    </div>
</div>
</body>
</html>
